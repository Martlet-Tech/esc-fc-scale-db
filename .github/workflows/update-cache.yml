name: Update cache

on:
  schedule:
    - cron: '0 6 * * 1'  # every Monday 06:00 UTC
  workflow_dispatch:      # manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch latest targets.h
        run: |
          curl -sL -o cache/targets.h \
            https://raw.githubusercontent.com/am32-firmware/AM32/main/Inc/targets.h

      - name: Write timestamp
        run: echo "$(date -u '+%Y-%m-%dT%H:%M:%SZ')" > cache/updated.txt

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update cached targets.h"
          file_pattern: cache/
